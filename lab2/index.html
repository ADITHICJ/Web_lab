<!doctype html>
<html>
  <head>
    <title>Student Feedback Form</title>
  </head>
  <body>
    <center>
      <h2>Student Feedback Form</h2>

      <form>
        <fieldset style="width: 350px; margin-top: 50px">
          Name:
          <input type="text" /><br /><br />

          USN:
          <input type="text" /><br /><br />

          Gender:
          <input type="radio" name="gender" /> Male
          <input type="radio" name="gender" /> Female <br /><br />

          Semester:
          <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
          <br /><br />

          <b>Facilities you liked:</b><br />

          <table>
            <tr>
              <td><input type="checkbox" /></td>
              <td>Library</td>
            </tr>
            <tr>
              <td><input type="checkbox" /></td>
              <td>Computer Lab</td>
            </tr>
            <tr>
              <td><input type="checkbox" /></td>
              <td>Canteen</td>
            </tr>
            <tr>
              <td><input type="checkbox" /></td>
              <td>Sports</td>
            </tr>
          </table>

          <br />

          Feedback:<br />
          <textarea rows="5" cols="40"></textarea>
          <br /><br />

          <input type="submit" value="Submit" />
          <input type="reset" value="Reset" />
        </fieldset>
      </form>
    </center>
  </body>
</html>
